<div class="fondo" (click)="cancelar()"></div>
<dialog open>
  <h2>Agregar Tarea</h2>
  <form (ngSubmit)="crearTarea()">
    <p>
      <label for="titulo">Titulo</label>
      <input type="text" id="titulo" name="titulo" [(ngModel)]="nuevaTarea.titulo"/>
    </p>

    <p>
      <label for="resumen">Resumen</label>
      <textarea id="resumen" rows="5" name="resumen" [(ngModel)]="nuevaTarea.descripcion"></textarea>
    </p>

    <p>
      <label for="expira">Fecha Límite</label>
      <input type="date" id="expira" name="expira" [(ngModel)]="nuevaTarea.fecha"/>
    </p>

    <p class="acciones">
      <button type="button" (click)="cancelar()">Cancelar</button>
      <button type="submit">Crear</button>
    </p>
  </form>
</dialog>
